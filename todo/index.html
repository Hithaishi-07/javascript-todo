<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="todoapp">
        <header>
            <h1>todos</h1>
            <input type="text" id="new-todo" placeholder="What needs to be done?" autocomplete="off">
        </header>
        
        <div class="main">
            <ul id="todo-list"></ul>
        </div>
        
        <div class="footer" id="footer" style="display: none;">
            <div class="count">
                <span id="active-count">0</span> item<span id="items-plural">s</span> left
            </div>
            
            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>
            
            <button id="clear-completed" style="display: none;">Clear completed</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
